<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniRun | Multi-Language Code Engine</title>
 
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600;700;800&display=swap%22 rel="stylesheet">
 
    <!-- CSS File -->
    <link rel="stylesheet" href="style.css">
</head>
 
<body class="dark-theme">
 
    <div class="app-shell">
 
        <!-- Sidebar -->
        <aside class="glass-sidebar">
            <div class="brand">OR</div>
 
            <nav class="side-nav">
                <div class="nav-icon active" title="Code Editor">代码</div>
                <div class="nav-icon" title="Analytics">📈</div>
                <div class="nav-icon" title="Projects">📁</div>
            </nav>
        </aside>
 
        <!-- Main Section -->
        <main class="editor-stage">
 
            <!-- Top Ribbon -->
            <header class="glass-header">
 
                <!-- Left Side -->
                <div class="path-info">
                    <span class="folder">projects /</span>
                    <span id="file-display" class="active-file">main.py</span>
                </div>
 
                <!-- Right Side Buttons -->
                <div class="top-actions">
 
                    <!-- Theme Button -->
                    <button class="top-btn theme-btn" onclick="toggleTheme()" id="theme-btn">
                        🌙
                    </button>
 
                    <!-- Language Select -->
                    <div class="custom-select-wrapper">
                        <select id="language" onchange="updateEditorMode()">
                            <option value="python">Python 3.11</option>
                            <option value="cpp">C++ 20</option>
                            <option value="javascript">Node.js</option>
                        </select>
                    </div>
 
                    <!-- Run Button -->
                    <button class="glow-run-btn" onclick="runCode()">
                        ▶ RUN CODE
                    </button>
 
                </div>
            </header>
 
            <!-- Workspace -->
            <section class="workspace">
 
                <!-- Code Editor -->
                <div class="code-zone">
                    <div class="editor-inner">
 
                        <div class="line-gutter" id="gutter"></div>
 
                        <textarea
                            id="code"
                            spellcheck="false"
                            oninput="handleInput()"
                        >def compute_logic():
    # OmniRun Engine Ready
    result = [x**2 for x in range(10)]
    print(f"Computed Data: {result}")
 
compute_logic()</textarea>
 
                    </div>
                </div>
 
                <!-- Output Section -->
                <div class="output-zone">
 
                    <!-- Tabs -->
                    <div class="panel-tabs">
                        <button class="tab-link active" onclick="switchPanel('console')">
                            Console
                        </button>
 
                        <button class="tab-link" onclick="switchPanel('input')">
                            Input
                        </button>
 
                        <button class="tab-link" onclick="switchPanel('metrics')">
                            Metrics
                        </button>
                    </div>
 
                    <!-- Console -->
                    <div class="console-body" id="console-pane">
                        <pre id="output">Initialize OmniRun Kernel... [OK]</pre>
                    </div>
 
                    <!-- Input -->
                    <div class="input-body hidden" id="input-pane">
                        <textarea
                            id="input_data"
                            placeholder="Enter your input here..."
                        ></textarea>
                    </div>
 
                    <!-- Metrics -->
                    <div class="metrics-body hidden" id="metrics-pane">
 
                        <div class="metric-card">
                            <span class="label">EXECUTION TIME</span>
                            <span class="value" id="stat-time">0.00 ms</span>
                        </div>
 
                        <div class="metric-card">
                            <span class="label">MEMORY PEAK</span>
                            <span class="value" id="stat-mem">0.0 KB</span>
                        </div>
 
                    </div>
 
                </div>
 
            </section>
 
        </main>
 
    </div>
 
    <!-- JS File -->
    <script src="script.js"></script>
 
</body>
</html>
